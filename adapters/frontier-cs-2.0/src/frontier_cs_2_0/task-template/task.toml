schema_version = "1.1"

[task]
name = "frontier-cs/{task_id}"
authors = [{{ name = "Frontier-CS Team", email = "frontier-cs@berkeley.edu" }}]
keywords = ["frontier-cs", "frontier-cs-2.0", "optimization", "geometry"]

[metadata]
difficulty = "hard"
category = "optimization"
tags = ["frontier-cs", "frontier-cs-2.0", "{tag}"]
frontier_cs_problem_id = "{problem_id}"
frontier_cs_track = "2.0"

[verifier]
timeout_sec = {timeout_sec}

[agent]
timeout_sec = {agent_timeout_sec}

[environment]
build_timeout_sec = {environment_build_timeout_sec}
cpus = {cpus}
memory_mb = {memory_mb}
storage_mb = {storage_mb}
gpus = 0
allow_internet = true
